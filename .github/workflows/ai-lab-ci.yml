name: AI Labs CI

on:
  push:
  pull_request:

jobs:
  test-notebooks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.9"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install \
            jupyter \
            notebook \
            nbconvert \
            numpy \
            pandas \
            matplotlib \
            seaborn \
            scipy \
            scikit-learn \
            tensorflow \
            pillow

      - name: Execute notebooks
        run: |
          find . -type f -name "*.ipynb" -print0 | while IFS= read -r -d '' notebook; do
            echo "Executing $notebook"
            jupyter nbconvert \
              --to notebook \
              --execute \
              --inplace \
              "$notebook"
          done